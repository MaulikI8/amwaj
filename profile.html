<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | AMWAJ ALMSELA</title>
    <meta name="description" content="Manage your AMWAJ ALMSELA account, view orders, and update your profile settings.">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="css/theme.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/premium-polish.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
        }

        /* Profile Layout */
        .profile-container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 16px;
        }
        .profile-header {
            background: linear-gradient(135deg, #1b7fed 0%, #0d5bbd 100%);
            border-radius: 20px;
            padding: 40px 36px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 28px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(27, 127, 237, 0.18);
            position: relative;
            overflow: hidden;
        }
        .profile-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }
        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.5);
            object-fit: cover;
            background: rgba(255,255,255,0.15);
            flex-shrink: 0;
        }
        .profile-avatar-placeholder {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #fff;
            flex-shrink: 0;
        }
        .profile-header-info h2 {
            margin: 0 0 4px;
            font-size: 24px;
            font-weight: 700;
        }
        .profile-header-info p {
            margin: 0;
            opacity: 0.85;
            font-size: 14px;
        }

        /* Tabs */
        .profile-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .profile-tab {
            padding: 10px 22px;
            border-radius: 12px;
            background: #fff;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: #64748b;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        .profile-tab:hover {
            background: #f1f5f9;
            color: #1b7fed;
        }
        .profile-tab.active {
            background: #1b7fed;
            color: #fff;
            border-color: #1b7fed;
        }

        /* Cards */
        .profile-card {
            background: #fff;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.02);
            padding: 32px;
            margin-bottom: 24px;
        }
        .profile-card h4 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #0f172a;
        }
        .profile-card .form-group {
            margin-bottom: 18px;
        }
        .profile-card label {
            font-weight: 600;
            font-size: 13px;
            color: #475569;
            margin-bottom: 6px;
            display: block;
        }
        .profile-card .form-control {
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 10px 14px;
            font-size: 14px;
            transition: border-color 0.2s ease;
        }
        .profile-card .form-control:focus {
            border-color: #1b7fed;
            box-shadow: 0 0 0 3px rgba(27, 127, 237, 0.1);
        }
        .profile-card .btn-primary {
            background: #1b7fed;
            border-color: #1b7fed;
            border-radius: 12px;
            padding: 10px 28px;
            font-weight: 600;
            font-size: 14px;
        }
        .profile-card .btn-primary:hover {
            background: #0d5bbd;
        }

        /* Tab content */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Orders table */
        .order-row {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f1f5f9;
            gap: 16px;
            flex-wrap: wrap;
        }
        .order-row:last-child { border-bottom: none; }
        .order-id {
            font-weight: 700;
            color: #1b7fed;
            min-width: 80px;
        }
        .order-date {
            color: #64748b;
            font-size: 13px;
            min-width: 100px;
        }
        .order-total {
            font-weight: 700;
            color: #0f172a;
            min-width: 100px;
        }
        .order-status {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
        }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-processing { background: #dbeafe; color: #1e40af; }
        .status-shipped { background: #e0e7ff; color: #3730a3; }
        .status-delivered { background: #d1fae5; color: #065f46; }
        .status-cancelled { background: #fee2e2; color: #991b1b; }

        /* Alert */
        .profile-alert {
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 18px;
            display: none;
        }
        .profile-alert.alert-success { background: #d1fae5; color: #065f46; display: block; }
        .profile-alert.alert-danger { background: #fee2e2; color: #991b1b; display: block; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }
        .empty-state p {
            font-size: 15px;
        }

        /* Back link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            margin-bottom: 20px;
            transition: color 0.2s;
        }
        .back-link:hover { color: #1b7fed; text-decoration: none; }

        @media (max-width: 576px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
                padding: 28px 20px;
            }
            .profile-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <!-- Back -->
        <a href="/home" class="back-link">
            <i class="fa fa-arrow-left"></i> Back to Store
        </a>

        <!-- Profile Header -->
        <div class="profile-header" id="profile-header">
            <div class="profile-avatar-placeholder" id="avatar-display">
                <i class="fa fa-user"></i>
            </div>
            <div class="profile-header-info">
                <h2 id="header-name">Loading...</h2>
                <p id="header-email">...</p>
                <p id="header-phone" style="margin-top: 2px;"></p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="profile-tabs">
            <div class="profile-tab active" data-tab="info"><i class="fa fa-user mr-1"></i> Profile</div>
            <div class="profile-tab" data-tab="orders"><i class="fa fa-shopping-bag mr-1"></i> My Orders</div>
            <div class="profile-tab" data-tab="password"><i class="fa fa-lock mr-1"></i> Change Password</div>
        </div>

        <!-- TAB: Profile Info -->
        <div class="tab-panel active" id="tab-info">
            <div class="profile-card">
                <h4><i class="fa fa-pencil-square-o mr-2" style="color: #1b7fed;"></i>Edit Profile</h4>
                <div id="profile-alert" class="profile-alert"></div>
                <form id="profile-form">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="edit-name" class="form-control" placeholder="Your name" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" id="edit-email" class="form-control" disabled>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="tel" id="edit-phone" class="form-control" placeholder="e.g. +974 1234 5678">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Avatar Image</label>
                                <input type="file" id="edit-avatar" class="form-control" accept="image/*">
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary mt-2">
                        <i class="fa fa-check mr-1"></i> Save Changes
                    </button>
                </form>
            </div>
        </div>

        <!-- TAB: My Orders -->
        <div class="tab-panel" id="tab-orders">
            <div class="profile-card">
                <h4><i class="fa fa-shopping-bag mr-2" style="color: #1b7fed;"></i>Order History</h4>
                <div id="orders-list">
                    <div class="text-center py-4">
                        <span class="spinner-border text-primary" role="status"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB: Change Password -->
        <div class="tab-panel" id="tab-password">
            <div class="profile-card">
                <h4><i class="fa fa-shield mr-2" style="color: #1b7fed;"></i>Change Password</h4>
                <div id="password-alert" class="profile-alert"></div>
                <form id="password-form">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Current Password</label>
                                <input type="password" id="current-password" class="form-control" required>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>New Password</label>
                                <input type="password" id="new-password" class="form-control" required minlength="6">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Confirm New Password</label>
                                <input type="password" id="confirm-password" class="form-control" required minlength="6">
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary mt-2">
                        <i class="fa fa-lock mr-1"></i> Update Password
                    </button>
                </form>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0 small">Copyright &copy; 2026 Amwaj Almesela. All Rights Reserved.</p>
            <div class="mt-2">
                <a href="/about-us" class="text-white-50 mx-2 small text-decoration-none">About Us</a>
                <a href="#" class="text-white-50 mx-2 small text-decoration-none">Terms & Conditions</a>
                <a href="#" class="text-white-50 mx-2 small text-decoration-none">Privacy Policy</a>
                <a href="/refund-policy" class="text-white-50 mx-2 small text-decoration-none">Refund Policy</a>
                <a href="/cancellation-policy" class="text-white-50 mx-2 small text-decoration-none">Cancellation Policy</a>
                <a href="/return-policy" class="text-white-50 mx-2 small text-decoration-none">Return Policy</a>
            </div>
        </div>
    </footer>

    <!-- JS Dependencies -->
    <script src="js/jquery-3.6.0.min.js"></script>

    <script>
        const API_BASE = '/api/v1';
        const token = localStorage.getItem('token');

        // Guard: redirect if not logged in
        if (!token) {
            alert('Please sign in to view your profile.');
            window.location.href = '/home';
        }

        function authHeaders() {
            return { 'Authorization': `Bearer ${token}` };
        }

        // Tab switching
        $('.profile-tab').on('click', function() {
            const tabName = $(this).data('tab');
            $('.profile-tab').removeClass('active');
            $(this).addClass('active');
            $('.tab-panel').removeClass('active');
            $(`#tab-${tabName}`).addClass('active');

            if (tabName === 'orders') loadOrders();
        });

        // 1. LOAD PROFILE
        function loadProfile() {
            $.ajax({
                url: `${API_BASE}/auth/me`,
                headers: authHeaders(),
                success: function(res) {
                    const u = res.data.user;
                    $('#header-name').text(u.name);
                    $('#header-email').text(u.email);
                    $('#header-phone').text(u.phone || '');
                    $('#edit-name').val(u.name);
                    $('#edit-email').val(u.email);
                    $('#edit-phone').val(u.phone || '');

                    if (u.avatar) {
                        $('#avatar-display').replaceWith(
                            `<img src="${u.avatar}" class="profile-avatar" id="avatar-display" onerror="this.src='images/image-place-holder.png'">`
                        );
                    } else {
                        const initials = u.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                        $('#avatar-display').html(initials || '<i class="fa fa-user"></i>');
                    }
                },
                error: function() {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/home';
                }
            });
        }

        // 2. UPDATE PROFILE
        $('#profile-form').on('submit', function(e) {
            e.preventDefault();
            const fd = new FormData();
            fd.append('name', $('#edit-name').val());
            fd.append('phone', $('#edit-phone').val());
            if ($('#edit-avatar')[0].files.length > 0) {
                fd.append('avatar', $('#edit-avatar')[0].files[0]);
            }

            $.ajax({
                url: `${API_BASE}/auth/update-profile`,
                method: 'PUT',
                headers: authHeaders(),
                data: fd,
                processData: false,
                contentType: false,
                success: function(res) {
                    showAlert('#profile-alert', 'Profile updated successfully!', 'success');
                    // Update localStorage
                    const u = res.data.user;
                    localStorage.setItem('user', JSON.stringify(u));
                    loadProfile();
                },
                error: function(err) {
                    const msg = err.responseJSON ? err.responseJSON.message : 'Failed to update profile.';
                    showAlert('#profile-alert', msg, 'danger');
                }
            });
        });

        // 3. CHANGE PASSWORD
        $('#password-form').on('submit', function(e) {
            e.preventDefault();
            const newPass = $('#new-password').val();
            const confirmPass = $('#confirm-password').val();

            if (newPass !== confirmPass) {
                showAlert('#password-alert', 'New passwords do not match.', 'danger');
                return;
            }

            $.ajax({
                url: `${API_BASE}/auth/change-password`,
                method: 'PUT',
                headers: authHeaders(),
                data: JSON.stringify({
                    currentPassword: $('#current-password').val(),
                    newPassword: newPass
                }),
                contentType: 'application/json',
                success: function() {
                    showAlert('#password-alert', 'Password changed successfully!', 'success');
                    $('#password-form')[0].reset();
                },
                error: function(err) {
                    const msg = err.responseJSON ? err.responseJSON.message : 'Failed to change password.';
                    showAlert('#password-alert', msg, 'danger');
                }
            });
        });

        // 4. LOAD ORDERS
        function loadOrders() {
            $.ajax({
                url: `${API_BASE}/orders/my-orders`,
                headers: authHeaders(),
                success: function(res) {
                    const orders = res.data || res || [];
                    const container = $('#orders-list');

                    if (!orders.length) {
                        container.html(`
                            <div class="empty-state">
                                <i class="fa fa-shopping-bag"></i>
                                <p>You haven't placed any orders yet.</p>
                                <a href="/products" class="btn btn-primary mt-3" style="border-radius: 12px;">Start Shopping</a>
                            </div>
                        `);
                        return;
                    }

                    let html = '';
                    orders.forEach(o => {
                        const date = new Date(o.created_at || o.createdAt).toLocaleDateString('en-US', {
                            year: 'numeric', month: 'short', day: 'numeric'
                        });
                        const total = parseFloat(o.total || o.grand_total || 0).toFixed(2);
                        const status = (o.status || 'pending').toLowerCase();
                        const statusClass = `status-${status}`;

                        html += `
                            <div class="order-row">
                                <span class="order-id">#${o.id}</span>
                                <span class="order-date">${date}</span>
                                <span class="order-total">QAR ${total}</span>
                                <span class="order-status ${statusClass}">${status}</span>
                            </div>
                        `;
                    });
                    container.html(html);
                },
                error: function() {
                    $('#orders-list').html('<div class="text-center text-danger py-3">Failed to load orders.</div>');
                }
            });
        }

        // Helpers
        function showAlert(selector, msg, type) {
            $(selector).text(msg)
                .removeClass('alert-success alert-danger')
                .addClass(`alert-${type}`)
                .show();
            setTimeout(() => $(selector).fadeOut(), 5000);
        }

        // Init
        loadProfile();
    </script>
</body>
</html>
